name: Continuous Integration

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/continuous-integration.yml'
      - '.github/workflows/lint-markdown.yml'
      - '.github/workflows/lint-and-publish-bicep.yml'
      - '.github/workflows/validate-infrastructure.yml'
      - '.markdownlint*.json*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/**'
      - 'labs/**'
      - 'scripts/**'
      - 'shared/**'
      - 'infra/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/continuous-integration.yml'
      - '.github/workflows/lint-markdown.yml'
      - '.github/workflows/lint-and-publish-bicep.yml'
      - '.github/workflows/validate-infrastructure.yml'
      - '.markdownlint*.json*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docs/**'
      - 'labs/**'
      - 'scripts/**'
      - 'shared/**'
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown Lint
    uses: ./.github/workflows/lint-markdown.yml
    permissions:
      contents: read
      pull-requests: write

  docs-build:
    name: Build Workshop Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm run docs:build

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml
    permissions:
      contents: read
      pull-requests: write

  python-smoke:
    name: Python Syntax Smoke Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'

      - name: Compile Python sources
        run: uv run --no-sync python -m compileall labs scripts shared
