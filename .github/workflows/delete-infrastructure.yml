name: Delete Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: The environment to delete infrastructure for.
        required: true
        type: string
      AZURE_ENV_NAME:
        description: The Azure Developer CLI environment name.
        required: true
        type: string
      AZURE_LOCATION:
        description: The Azure region used for deployment.
        required: true
        type: string

    secrets:
      AZURE_TENANT_ID:
        description: Azure tenant ID for deployment authentication.
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: Azure subscription ID for deployment authentication.
        required: true
      AZURE_CLIENT_ID:
        description: Azure client ID for deployment authentication.
        required: true

jobs:
  delete-infrastructure:
    name: Delete Infrastructure ${{ inputs.ENVIRONMENT }}
    environment: ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}

    steps:
      - name: Authenticate Azure CLI (Federated Credentials)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group if it exists
        run: |
          RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          if az group exists --name "$RESOURCE_GROUP" 2>/dev/null | grep -qi "true"; then
            az group delete --name "$RESOURCE_GROUP" --yes
          fi

      - name: Purge soft-deleted Key Vault resources
        run: |
          RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          DELETED_VAULTS=$(az keyvault list-deleted \
            --subscription "$AZURE_SUBSCRIPTION_ID" \
            --query "[?contains(properties.vaultId, '${RESOURCE_GROUP}')]" -o json 2>/dev/null || echo "[]")

          if [ "$DELETED_VAULTS" != "[]" ] && [ -n "$DELETED_VAULTS" ]; then
            echo "$DELETED_VAULTS" | jq -c '.[]' | while read -r vault; do
              VAULT_NAME=$(echo "$vault" | jq -r '.name')
              VAULT_LOCATION=$(echo "$vault" | jq -r '.properties.location')
              az keyvault purge --name "$VAULT_NAME" --location "$VAULT_LOCATION" || true
            done
          fi

      - name: Purge soft-deleted Cognitive Services resources
        run: |
          RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          DELETED_ACCOUNTS=$(az cognitiveservices account list-deleted \
            --subscription "$AZURE_SUBSCRIPTION_ID" \
            --query "[?contains(id, '${RESOURCE_GROUP}')]" -o json 2>/dev/null || echo "[]")

          if [ "$DELETED_ACCOUNTS" != "[]" ] && [ -n "$DELETED_ACCOUNTS" ]; then
            echo "$DELETED_ACCOUNTS" | jq -c '.[]' | while read -r account; do
              ACCOUNT_NAME=$(echo "$account" | jq -r '.name')
              ACCOUNT_LOCATION=$(echo "$account" | jq -r '.location')
              ACCOUNT_RG=$(echo "$account" | jq -r '.id' | sed 's|.*/resourceGroups/\([^/]*\)/.*|\1|')
              az cognitiveservices account purge \
                --name "$ACCOUNT_NAME" \
                --resource-group "$ACCOUNT_RG" \
                --location "$ACCOUNT_LOCATION" || true
            done
          fi
