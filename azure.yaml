name: foundry-agentic-workshop
metadata:
  template: foundry-agentic-workshop@0.0.1
infra:
  provider: bicep
  path: infra
hooks:
  preprovision:
    posix:
      shell: sh
      run: python scripts/prepare-attendee-roles.py
    windows:
      shell: pwsh
      run: python scripts/prepare-attendee-roles.py
  postprovision:
    posix:
      shell: sh
      run: python scripts/generate-attendee-onboarding.py && python scripts/seed-product-index.py && python scripts/seed-document-index.py && python scripts/deploy-mcp-server.py
    windows:
      shell: pwsh
      run: python scripts/generate-attendee-onboarding.py; python scripts/seed-product-index.py; python scripts/seed-document-index.py; python scripts/deploy-mcp-server.py
