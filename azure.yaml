name: foundry-agentic-workshop
metadata:
  template: foundry-agentic-workshop@0.0.1
infra:
  provider: bicep
  path: infra
hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        uv run python scripts/check-model-quota.py &&
        uv run python scripts/prepare-attendee-roles.py
    windows:
      shell: pwsh
      run: |
        uv run python scripts/check-model-quota.py
        if ($LASTEXITCODE -ne 0){ exit $LASTEXITCODE }
        uv run python scripts/prepare-attendee-roles.py
  postprovision:
    posix:
      shell: sh
      run: |
        uv run python scripts/seed-product-index.py &&
        uv run python scripts/seed-document-index.py &&
        uv run python scripts/seed-passenger-rights-index.py &&
        uv run python scripts/deploy-retail-remedy-ops-mcp-server.py &&
        uv run python scripts/deploy-flight-ops-mcp-server.py &&
        uv run python scripts/generate-attendee-onboarding.py &&
        uv run python scripts/deploy-attendee-portal.py
    windows:
      shell: pwsh
      run: |
        uv run python scripts/seed-product-index.py
        uv run python scripts/seed-document-index.py
        uv run python scripts/seed-passenger-rights-index.py
        uv run python scripts/deploy-retail-remedy-ops-mcp-server.py
        uv run python scripts/deploy-flight-ops-mcp-server.py
        uv run python scripts/generate-attendee-onboarding.py
        uv run python scripts/deploy-attendee-portal.py
  predown:
    posix:
      shell: sh
      run: uv run --no-project python scripts/delete-attendee-portal.py
    windows:
      shell: pwsh
      run: uv run --no-project python scripts/delete-attendee-portal.py
