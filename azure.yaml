name: foundry-agentic-workshop
metadata:
  template: foundry-agentic-workshop@0.0.1
infra:
  provider: bicep
  path: infra
hooks:
  preprovision:
    posix:
      shell: sh
      run: python scripts/prepare-attendee-roles.py
    windows:
      shell: pwsh
      run: python scripts/prepare-attendee-roles.py
  postprovision:
    posix:
      shell: sh
      run: |
        python scripts/seed-product-index.py &&
        python scripts/seed-document-index.py &&
        python scripts/seed-passenger-rights-index.py &&
        python scripts/deploy-retail-remedy-ops-mcp-server.py &&
        python scripts/deploy-flight-ops-mcp-server.py &&
        python scripts/generate-attendee-onboarding.py &&
        python scripts/deploy-attendee-portal.py
    windows:
      shell: pwsh
      run: |
        python scripts/seed-product-index.py
        python scripts/seed-document-index.py
        python scripts/seed-passenger-rights-index.py
        python scripts/deploy-retail-remedy-ops-mcp-server.py
        python scripts/deploy-flight-ops-mcp-server.py
        python scripts/generate-attendee-onboarding.py
        python scripts/deploy-attendee-portal.py
  predown:
    posix:
      shell: sh
      run: python scripts/delete-attendee-portal.py
    windows:
      shell: pwsh
      run: python scripts/delete-attendee-portal.py
