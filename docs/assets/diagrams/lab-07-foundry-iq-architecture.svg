        font-size="11" font-weight="bold">retail-products</text>
  <text x="795" y="655" text-anchor="middle"
        fill="#777777" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9">~100 products</text>
  <text x="795" y="669" text-anchor="middle"
        fill="#777777" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9">+ semantic config</text>

  <!-- Index: retail-policies -->
  <rect x="864" y="600" width="124" height="84" rx="5"
        fill="#E1F5FE" stroke="#0277BD" stroke-width="1.5"/>
  <text x="926" y="621" text-anchor="middle"
        fill="#666666" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9">Search Index</text>
  <text x="926" y="639" text-anchor="middle"
        fill="#333333" font-family="'Segoe UI',Arial,sans-serif"
