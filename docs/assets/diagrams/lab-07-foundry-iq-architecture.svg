<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="730" viewBox="0 0 1040 730">
  <title>Lab 07 — Foundry IQ Knowledge Bases Architecture</title>
  <desc>Python Client calls the acl-remedy-advisor Agent Definition inside a Foundry Project inside a Foundry Account. The Agent Definition calls the chat Model Deployment and may invoke four connections: the Web Search Tool (which calls the Internet), the Code Interpreter Tool (sandboxed Python), the MCP Tool (which connects over an HTTPS dev tunnel to a Retail Remedy Operations MCP Server on the local dev machine), and a Knowledge Base connection (connected as an MCP tool) to a Foundry IQ Knowledge Base hosted in the connected Azure AI Search service. The Knowledge Base contains two Knowledge Sources that read from the retail-products and retail-policies search indexes.</desc>

  <!-- Background -->
  <rect width="1040" height="730" fill="white"/>

  <defs>
    <!-- Solid grey arrowhead -->
    <marker id="ah" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#555555"/>
    </marker>
    <!-- Blue arrowhead (request) -->
    <marker id="ah-blue" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#1565C0"/>
    </marker>
    <!-- Purple arrowhead (web search tool call) -->
    <marker id="ah-purple" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#6A1B9A"/>
    </marker>
    <!-- Red arrowhead (HTTP search) -->
    <marker id="ah-red" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#B71C1C"/>
    </marker>
    <!-- Teal arrowhead (LLM call) -->
    <marker id="ah-teal" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#006064"/>
    </marker>
    <!-- Orange arrowhead (code interpreter tool call) -->
    <marker id="ah-orange" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#E65100"/>
    </marker>
    <!-- Indigo arrowhead (MCP tool call / HTTPS tunnel) -->
    <marker id="ah-indigo" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#283593"/>
    </marker>
    <!-- Green arrowhead (knowledge base / MCP) -->
    <marker id="ah-green" markerWidth="12" markerHeight="8" refX="12" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#558B2F"/>
    </marker>
  </defs>

  <!-- ──────────────────────────────────────────
       CONTAINERS
       ────────────────────────────────────────── -->

  <!-- Foundry Account -->
  <rect x="210" y="20" width="790" height="375" rx="6"
        fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <path d="M 216,20 L 994,20 Q 1000,20 1000,26 L 1000,54 L 210,54 L 210,26 Q 210,20 216,20 Z"
        fill="#1565C0"/>
  <text x="605" y="43" text-anchor="middle"
        fill="white" font-family="'Segoe UI',Arial,sans-serif"
        font-size="14" font-weight="bold">Foundry Account</text>

  <!-- Foundry Project -->
  <rect x="245" y="72" width="720" height="305" rx="5"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M 251,72 L 959,72 Q 965,72 965,77 L 965,100 L 245,100 L 245,77 Q 245,72 251,72 Z"
        fill="#2E7D32"/>
  <text x="605" y="91" text-anchor="middle"
        fill="white" font-family="'Segoe UI',Arial,sans-serif"
        font-size="13" font-weight="bold">Foundry Project</text>

  <!-- ──────────────────────────────────────────
       NODES
       ────────────────────────────────────────── -->

  <!-- Agent Definition (inside Project) -->
  <rect x="300" y="125" width="210" height="90" rx="6"
        fill="#FFF3CD" stroke="#F59E0B" stroke-width="2"/>
  <text x="405" y="154" text-anchor="middle"
        fill="#333333" font-family="'Segoe UI',Arial,sans-serif"
        font-size="13" font-weight="bold">acl-remedy-advisor</text>
  <text x="405" y="173" text-anchor="middle"
        fill="#555555" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11">Agent Definition</text>
  <text x="405" y="190" text-anchor="middle"
        fill="#999999" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10">Versions: v1 · v2 · ...</text>

  <!-- chat model deployment (inside Project) -->
