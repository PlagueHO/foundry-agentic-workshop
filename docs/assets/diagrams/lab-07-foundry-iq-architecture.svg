        font-size="10" font-weight="bold">MCP · mcp://searchindex</text>

  <!-- 12. Knowledge Source retail-products → Index retail-products  (grey, reads) -->
  <path d="M 795,560 L 795,600"
        stroke="#555555" stroke-width="1.5" fill="none"
