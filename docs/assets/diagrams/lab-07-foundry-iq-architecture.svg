        font-size="10">Built-in · sandboxed</text>

  <!-- MCP Tool connection (inside Project) — center x=690 -->
  <rect x="611" y="270" width="158" height="72" rx="6"
        fill="#E8EAF6" stroke="#283593" stroke-width="2"/>
  <text x="690" y="299" text-anchor="middle"
        fill="#333333" font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" font-weight="bold">MCP Tool</text>
  <text x="690" y="318" text-anchor="middle"
        fill="#666666" font-family="'Segoe UI',Arial,sans-serif"
        font-size="10">retail-remedy-ops · 6 tools</text>

  <!-- Knowledge Base connection (inside Project) — center x=864 -->
  <rect x="785" y="270" width="158" height="72" rx="6"
        fill="#F1F8E9" stroke="#558B2F" stroke-width="2"/>
  <text x="864" y="299" text-anchor="middle"
