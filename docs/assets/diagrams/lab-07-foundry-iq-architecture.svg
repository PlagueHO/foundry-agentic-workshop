        font-size="11" font-weight="bold">retail-products</text>

  <!-- Knowledge Source: retail-policies -->
  <rect x="864" y="498" width="124" height="62" rx="5"
        fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="926" y="520" text-anchor="middle"
