  <text x="860" y="482" text-anchor="middle"
        fill="white" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="bold">Knowledge Base · Foundry IQ</text>

  <!-- Knowledge Source: retail-products -->
  <rect x="732" y="498" width="126" height="62" rx="5"
