        font-size="9">Knowledge Source</text>
  <text x="926" y="537" text-anchor="middle"
        fill="#333333" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" font-weight="bold">retail-policies</text>

  <!-- Index: retail-products -->
  <rect x="732" y="600" width="126" height="84" rx="5"
        fill="#E1F5FE" stroke="#0277BD" stroke-width="1.5"/>
  <text x="795" y="621" text-anchor="middle"
        fill="#666666" font-family="'Segoe UI',Arial,sans-serif"
        font-size="9">Search Index</text>
  <text x="795" y="639" text-anchor="middle"
