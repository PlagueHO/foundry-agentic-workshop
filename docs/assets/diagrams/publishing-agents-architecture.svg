<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560">
  <title>Publishing a Foundry Agent to Teams and Microsoft 365 Copilot</title>
  <desc>Publish-time and runtime architecture for the acl-remedy-advisor Foundry agent. The Foundry portal publishes the tested active version through the Foundry publish service, which creates or reuses Azure Bot Service, enables the activity protocol and authorization scheme, compiles a Teams app manifest, and submits it to the Microsoft 365 Copilot and Teams catalogs. At runtime, users send messages through Microsoft 365 Copilot or Teams to Azure Bot Service, which forwards activity to the Foundry agent stable endpoint and returns the agent response.</desc>

  <rect width="1000" height="560" fill="white"/>

  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#1565C0"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#6A1B9A"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#006064"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#2E7D32"/>
    </marker>
    <marker id="arrow-grey" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#555555"/>
    </marker>
  </defs>

  <text x="500" y="32" text-anchor="middle" fill="#222222" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold">Publish and run a Foundry agent in Teams and M365 Copilot</text>

  <!-- Publish-time control plane -->
  <rect x="20" y="55" width="960" height="220" rx="8" fill="#F5F9FE" stroke="#90CAF9" stroke-width="2"/>
  <text x="40" y="82" fill="#1565C0" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold">Publish-time control plane</text>

  <rect x="45" y="100" width="180" height="135" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="135" y="139" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Foundry portal</text>
  <text x="135" y="160" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Test active version</text>
  <text x="135" y="178" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Add metadata</text>
  <text x="135" y="196" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Choose publish scope</text>

  <rect x="285" y="100" width="240" height="135" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="405" y="130" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Foundry publish service</text>
  <text x="405" y="153" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Validates metadata</text>
  <text x="405" y="171" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Compiles Teams app manifest</text>
  <text x="405" y="189" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Enables activity protocol</text>
  <text x="405" y="207" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Sets authorization scheme</text>

  <rect x="585" y="100" width="170" height="135" rx="6" fill="#FFF3CD" stroke="#F59E0B" stroke-width="2"/>
  <text x="670" y="131" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Azure Bot Service</text>
  <text x="670" y="154" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Create or reuse bot</text>
  <text x="670" y="172" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Activity channel</text>
  <text x="670" y="190" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">BotServiceRbac or</text>
  <text x="670" y="207" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">BotServiceTenant</text>

  <rect x="815" y="100" width="140" height="135" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="885" y="132" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Agent catalogs</text>
  <text x="885" y="156" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">M365 Copilot</text>
  <text x="885" y="174" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Teams</text>
  <text x="885" y="198" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="10">Your agents or</text>
  <text x="885" y="213" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="10">Built by your org</text>

  <path d="M 225,162 L 285,162" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 525,162 L 585,162" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 755,162 L 815,162" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="255" y="151" text-anchor="middle" fill="#1565C0" font-family="'Segoe UI',Arial,sans-serif" font-size="10">Publish</text>
  <text x="555" y="151" text-anchor="middle" fill="#1565C0" font-family="'Segoe UI',Arial,sans-serif" font-size="10">Configure</text>
  <text x="785" y="151" text-anchor="middle" fill="#1565C0" font-family="'Segoe UI',Arial,sans-serif" font-size="10">Submit</text>

  <!-- Runtime data plane -->
  <rect x="20" y="310" width="960" height="220" rx="8" fill="#FAF7FC" stroke="#CE93D8" stroke-width="2"/>
  <text x="40" y="337" fill="#6A1B9A" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold">Runtime data plane</text>

  <rect x="45" y="350" width="155" height="135" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="122" y="397" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">User</text>
  <text x="122" y="420" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Sends a message</text>
  <text x="122" y="438" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Receives a response</text>

  <rect x="245" y="350" width="180" height="135" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="335" y="382" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Teams or</text>
  <text x="335" y="400" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">M365 Copilot</text>
  <text x="335" y="424" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Agent surface</text>
  <text x="335" y="442" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Catalog discovery</text>
  <text x="335" y="460" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Inline sign-in if needed</text>

  <rect x="470" y="350" width="180" height="135" rx="6" fill="#FFF3CD" stroke="#F59E0B" stroke-width="2"/>
  <text x="560" y="382" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Azure Bot Service</text>
  <text x="560" y="406" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Activity protocol</text>
  <text x="560" y="424" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Authorization check</text>
  <text x="560" y="442" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Message routing</text>

  <rect x="695" y="350" width="250" height="135" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="820" y="378" text-anchor="middle" fill="#333333" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold">Foundry stable endpoint</text>
  <text x="820" y="398" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">acl-remedy-advisor</text>
  <text x="820" y="419" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Active agent version</text>
  <text x="820" y="437" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Model deployment</text>
  <text x="820" y="455" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Web Search and Code Interpreter</text>
  <text x="820" y="475" text-anchor="middle" fill="#1565C0" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold">Stable URL remains the same as versions change</text>

  <path d="M 200,417 L 245,417" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 425,417 L 470,417" stroke="#6A1B9A" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 650,417 L 695,417" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M 695,450 L 650,450" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-grey)"/>
  <path d="M 470,450 L 425,450" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-grey)"/>
  <path d="M 245,450 L 200,450" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-grey)"/>
  <text x="672" y="470" text-anchor="middle" fill="#777777" font-family="'Segoe UI',Arial,sans-serif" font-size="10">response</text>
  <text x="447" y="470" text-anchor="middle" fill="#777777" font-family="'Segoe UI',Arial,sans-serif" font-size="10">response</text>
  <text x="222" y="470" text-anchor="middle" fill="#777777" font-family="'Segoe UI',Arial,sans-serif" font-size="10">response</text>

  <text x="500" y="520" text-anchor="middle" fill="#555555" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Scope controls visibility. Just you / Shared is available immediately; organization scope requires Microsoft 365 admin approval.</text>
</svg>
